name: Velt Engine CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: ${{ matrix.os }} - ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        config: [Release]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev xorg-dev libx11-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev \
            libasound2-dev libpulse-dev libdbus-1-dev

      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.4.304.1
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Install DXC (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -L -o dxc.zip https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.8.2407/dxc_2024_07_31.zip
          mkdir -p dxc_pkg
          7z x dxc.zip -odxc_pkg
          # Use cygpath to ensure we have a clean path for the environment
          echo "$(pwd)/dxc_pkg/bin/x64" >> $GITHUB_PATH

      - name: Install DXC (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          # Corrected URL for the v1.8.2407 release
          wget https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.8.2407/dxc_2024_07_31.linux.tar.gz
          mkdir -p dxc_pkg
          tar -xzf dxc_2024_07_31.linux.tar.gz -C dxc_pkg
          echo "$(pwd)/dxc_pkg/bin/x64" >> $GITHUB_PATH

      - name: Install macOS Extra Deps
        if: runner.os == 'macOS'
        run: brew install sdl3 vulkan-tools

      - name: Configure CMake
        shell: bash
        run: |
          # Use absolute paths with forward slashes for CMake/MSBuild compatibility
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            DXC_PATH="${{ github.workspace }}/dxc_pkg/bin/x64/dxc.exe"
            # Convert to Windows style but with forward slashes for CMake
            DXC_PATH=$(echo "$DXC_PATH" | sed 's/\\/\//g')
          else
            DXC_PATH="${{ github.workspace }}/dxc_pkg/bin/x64/dxc"
          fi
          
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DDXC_EXECUTABLE="$DXC_PATH" \
            ${{ runner.os == 'macOS' && '-DAPPLE_VULKAN_SUPPORT=ON' || '' }}

      - name: Build Velt
        run: cmake --build build --config ${{ matrix.config }}
